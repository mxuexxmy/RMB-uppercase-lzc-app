<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：从深蓝到亮蓝 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>

    <!-- 强调色渐变：金色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- 内阴影效果 -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0" />
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceAlpha" operator="in" />
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96"
        fill="url(#mainGradient)"
        filter="url(#shadow)"/>

  <!-- 装饰性圆环（外圈） -->
  <circle cx="256" cy="256" r="180"
          fill="none"
          stroke="rgba(255,255,255,0.15)"
          stroke-width="2"/>

  <!-- 装饰性圆环（内圈） -->
  <circle cx="256" cy="256" r="140"
          fill="none"
          stroke="rgba(255,255,255,0.1)"
          stroke-width="1.5"/>

  <!-- 人民币符号 ¥ -->
  <g filter="url(#innerShadow)">
    <!-- Y字横线 -->
    <line x1="156" y1="210" x2="356" y2="210"
          stroke="url(#accentGradient)"
          stroke-width="16"
          stroke-linecap="round"/>

    <!-- Y字第二横线 -->
    <line x1="156" y1="250" x2="356" y2="250"
          stroke="url(#accentGradient)"
          stroke-width="16"
          stroke-linecap="round"/>

    <!-- Y字竖线 -->
    <line x1="256" y1="130" x2="256" y2="340"
          stroke="url(#accentGradient)"
          stroke-width="18"
          stroke-linecap="round"/>

    <!-- Y字左斜线 -->
    <line x1="256" y1="210" x2="170" y2="310"
          stroke="url(#accentGradient)"
          stroke-width="16"
          stroke-linecap="round"/>

    <!-- Y字右斜线 -->
    <line x1="256" y1="210" x2="342" y2="310"
          stroke="url(#accentGradient)"
          stroke-width="16"
          stroke-linecap="round"/>
  </g>

  <!-- 转换箭头（左上） -->
  <g transform="translate(120, 120)">
    <circle cx="0" cy="0" r="32"
            fill="rgba(255,255,255,0.95)"
            filter="url(#shadow)"/>
    <path d="M -8,-4 L 2,-4 L 2,-10 L 10,0 L 2,10 L 2,4 L -8,4 Z"
          fill="#1e40af"/>
  </g>

  <!-- 转换箭头（右下） -->
  <g transform="translate(392, 392)">
    <circle cx="0" cy="0" r="32"
            fill="rgba(255,255,255,0.95)"
            filter="url(#shadow)"/>
    <path d="M 8,4 L -2,4 L -2,10 L -10,0 L -2,-10 L -2,-4 L 8,-4 Z"
          fill="#1e40af"/>
  </g>

  <!-- 数字装饰元素（左下角） -->
  <g transform="translate(120, 392)" opacity="0.3">
    <text x="0" y="0"
          font-family="Arial, sans-serif"
          font-size="48"
          font-weight="bold"
          fill="#ffffff"
          text-anchor="middle"
          dominant-baseline="middle">¥</text>
  </g>

  <!-- 中文装饰元素（右上角） -->
  <g transform="translate(392, 120)" opacity="0.3">
    <text x="0" y="0"
          font-family="Noto Sans SC, PingFang SC, sans-serif"
          font-size="36"
          font-weight="bold"
          fill="#ffffff"
          text-anchor="middle"
          dominant-baseline="middle">元</text>
  </g>

  <!-- 顶部光泽效果 -->
  <ellipse cx="256" cy="180"
           rx="200" ry="120"
           fill="rgba(255,255,255,0.08)"/>
</svg>